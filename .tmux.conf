# QoL
set -g mouse on
set -g set-clipboard on
set-option -g allow-rename off
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Fix Leader
unbind C-b
set-option -g prefix C-s

#Theme setup, basic - true to tmux style w/ no plugin
set -g window-status-separator ""
set -g status-left "#{?client_prefix,#[fg=black]#[bg=white] ó°ŒŒ #S #[fg=white]#[bg=black]î‚°,#[fg=black]#[bg=green] ó°ŒŒ #S #[fg=green]#[bg=black]î‚°}"
set -g status-right "#{prefix_highlight}#[fg=green,bg=black]î‚²#[fg=black,bg=green] %Y-%m-%d #[fg=black,bg=green]î‚³#[fg=black,bg=green] %H:%M #[fg=white,bg=green]î‚²#[fg=black,bg=white] #H "
set -g window-status-current-format "#[fg=black,bg=white]î‚° #[bg=white] #I î‚± #W #[fg=white,bg=black]î‚°"
